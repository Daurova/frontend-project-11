<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Reader</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
    <div class="container  bg-second">
        <div class="">
          <button class="btn btn-sm btn-outline-secondary" id="lang-ru">RU</button>
          <button class="btn btn-sm btn-outline-secondary" id="lang-en">EN</button>
        </div>        
        <h1>RSS Reader</h1>
        <div id = 'slogan'>Начните читать RSS сегодня! Это легко, это красиво.</div>
        <form id="rss-form" novalidate>
            <div class="mb-3">
                <input 
                    type="text" 
                    class="form-control" 
                    id="rss-url" 
                    required
                >
            </div>
            <button type="submit" class="btn btn-primary" id = "btn">Добавить</button>
        </form>
        <div id = 'example'>Пример: https://lorem-rss.hexlet.app/feed</div>
    <div class="row bg-main font-main">
   
    <div class="col-md-8">
      <h2 data-i18n="postsTitle">Посты</h2>
      <!-- <button id = 'btn-view-posts'></button> -->
      <div id="posts-container"></div>
    </div>
     <div class="col-md-4">
      <h2 data-i18n="feedsTitle">Фиды</h2>
      <div id="feeds-container" class="font-main"></div>
    </div>
  </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
