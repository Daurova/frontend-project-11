<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Reader</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
    <div class="container  bg-second">
        <div class="container-languages">
          <button class="btn btn-sm btn-outline-secondary" id="lang-ru">RU</button>
          <button class="btn btn-sm btn-outline-secondary" id="lang-en">EN</button>
        </div>        
        <h1 id = 'title'></h1>
        <div id = 'slogan'>Начните читать RSS сегодня! Это легко, это красиво.</div>
        <form id="rss-form" novalidate>
                <input 
                    type="text" 
                    class="form-control" 
                    id="rss-url" 
                    aria-label="url"
                    required
                >
            <button type="submit" class="btn btn-primary btn-lg" id = "btn">Добавить</button>
        </form>
        <div id = 'example'>Пример: https://lorem-rss.hexlet.app/feed</div>
        <div id="feedback-container" style="min-height: 2.5rem;"></div>
    <div class="row bg-main font-main container-second">
   
    <div class="col-md-6">
      <h2 data-i18n="postsTitle">Посты</h2>
      <div id="posts-container" class = 'posts'></div>
    </div>
     <div class="col-md-6">
      <h2 data-i18n="feedsTitle">Фиды</h2>
      <div id="feeds-container" class="font-main feeds"></div>
    </div>
    </div>
    </div>
    <!--Modal-->
<div class="modal fade" tabindex="-1" id="modal" >
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id = 'modal-title'>Modal title</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div>
        <p class="modal-body" id = 'modal-body'>Modal body text goes here.</p>
      </div>
      <div class="modal-footer">
        <a type="button" class="btn btn-primary" id = 'btn-modal-readAll'></a>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id = 'btn-modal-close'></button>
      </div>
    </div>
  </div>
</div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
