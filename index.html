<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Reader</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
    <div class="container mt-5">
        <h1>RSS Reader</h1>
        <form id="rss-form">
            <div class="mb-3">
                <input 
                    type="url" 
                    class="form-control" 
                    id="rss-url" 
                    placeholder="Введите URL RSS-потока"
                    required
                >
            </div>
            <button type="submit" class="btn btn-primary">Добавить RSS</button>
        </form>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
